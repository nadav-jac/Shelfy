<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background — fills edge-to-edge for maskable cropping -->
  <rect width="512" height="512" rx="100" fill="#3b82f6"/>
  <!--
    Inner shelf icon: the exact same shapes as Navbar ShelfIcon (viewBox 0 0 20 20),
    placed in a 320×320 area centered in the 512×512 canvas (96px padding each side).
  -->
  <svg x="96" y="96" width="320" height="320" viewBox="0 0 20 20">
    <rect x="1"    y="4"  width="18"  height="2.5" rx="1.25" fill="white"/>
    <rect x="1"    y="9"  width="18"  height="2.5" rx="1.25" fill="white"/>
    <rect x="1"    y="14" width="18"  height="2.5" rx="1.25" fill="white"/>
    <rect x="2"    y="4"  width="1.5" height="10"  rx="0.75" fill="white"/>
    <rect x="16.5" y="4"  width="1.5" height="10"  rx="0.75" fill="white"/>
  </svg>
</svg>
