name: "Shelfy"
description: "Personal home storage manager — track what's in your cabinets and find it fast."
version: "1.4.0"
slug: "shelfy"

# No S6-overlay init scripts needed; run.sh starts the process directly.
init: false

arch:
  - aarch64
  - amd64
  - armv7

startup: application
boot: auto

ports:
  43127/tcp: 43127
ports_description:
  43127/tcp: "Shelfy direct access (used by QR code URLs)"

ingress: true
ingress_port: 43127
ingress_entry: "/"
panel_icon: mdi:archive
panel_title: "Shelfy"

options:
  qr_base_url: "http://homeassistant.local:43127"
schema:
  qr_base_url: str

# /data is Home Assistant's persistent storage directory for add-ons.
# The SQLite database is stored here so it survives container rebuilds.
map:
  - data:rw
